name: CI

# Build the freestanding M0 binary and run the pytest behavioral suite on both
# targets — the DESIGN §6.2 "same test, both ABIs" gate. The linux job links and
# runs the ELF (ld ships on the runner); the windows job links and runs the PE
# (MSVC toolset ships on the runner). Same test file, two legs.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nasm
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nasm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install scons + pytest
        run: python -m pip install --upgrade pip scons pytest

      - name: Build (target=linux)
        run: python -m SCons target=linux

      - name: Test
        run: python -m pytest tests -v

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # choco installs to %ProgramFiles%\NASM, one of the SConstruct's known
      # candidate paths — no PATH surgery needed.
      - name: Install nasm
        run: choco install nasm -y --no-progress

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install scons + pytest
        run: python -m pip install --upgrade pip scons pytest

      # MSVC link.exe + Windows SDK ship on the runner image; the SConstruct
      # locates them via vswhere.
      - name: Build (target=win64)
        run: python -m SCons target=win64

      - name: Test
        run: python -m pytest tests -v
